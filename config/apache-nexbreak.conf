# NexBreak — Apache site (Ubuntu 24.04)
# Install:
#   sudo cp config/apache-nexbreak.conf /etc/apache2/sites-available/nexbreak.conf
#   sudo a2enmod rewrite headers
#   sudo a2ensite nexbreak
#   sudo systemctl reload apache2
#
# Adjust ServerName / DocumentRoot / paths for the station.

<VirtualHost *:80>
    ServerName nexbreak.local
    DocumentRoot /opt/nexbreak/web

    <Directory /opt/nexbreak/web>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # HLS origin_pull: nexbreak-egress writes under /var/lib/nexbreak/hls/<svc>/
    Alias /hls/ /var/lib/nexbreak/hls/
    <Directory /var/lib/nexbreak/hls>
        Options -Indexes +FollowSymLinks
        Require all granted
        AddType application/vnd.apple.mpegurl .m3u8
        AddType video/mp2t .ts
        Header set Cache-Control "no-cache"
        Header set Access-Control-Allow-Origin "*"
    </Directory>

    # PHP API proxy lives at web/api/index.php — /api/v1/... stays same-origin.
    # Controller listens on 127.0.0.1:8787 only (not exposed here).

    ErrorLog ${APACHE_LOG_DIR}/nexbreak-error.log
    CustomLog ${APACHE_LOG_DIR}/nexbreak-access.log combined

    # Optional: pass controller base to PHP if non-default
    # SetEnv NEXBREAK_API_BASE http://127.0.0.1:8787
</VirtualHost>

# TLS example (enable after certs exist):
# <VirtualHost *:443>
#     ServerName nexbreak.example.com
